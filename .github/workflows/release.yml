name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v1.2.3)
        required: true
        type: string
      release_name:
        description: Release title (optional)
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark release as pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install panel dependencies
        run: bun install --cwd panel --frozen-lockfile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl
          if ! command -v upx >/dev/null 2>&1 && command -v upx-ucl >/dev/null 2>&1; then
            sudo ln -sf "$(command -v upx-ucl)" /usr/local/bin/upx
          fi
          upx --version

      - name: Install build tools
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/jashok5/gox@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate release input
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$TAG" ]; then
            echo "tag is required"
            exit 1
          fi
          case "$TAG" in
            v*) ;;
            *)
              echo "tag must start with 'v' (example: v1.2.3)"
              exit 1
              ;;
          esac

      - name: Run tests
        run: task test

      - name: Build multi-platform binaries
        run: task build:gox

      - name: Generate checksums
        run: |
          cd bin
          shasum -a 256 node_* > checksums.txt

      - name: Push git tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag already exists locally: $TAG"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "tag already exists on origin: $TAG"
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          TITLE="$TAG"
          if [ -n "$RELEASE_NAME" ]; then
            TITLE="$RELEASE_NAME"
          fi

          EXTRA_ARGS=""
          if [ "$PRERELEASE" = "true" ]; then
            EXTRA_ARGS="--prerelease"
          fi

          gh release create "$TAG" bin/node_* bin/checksums.txt \
            --title "$TITLE" \
            --generate-notes \
            $EXTRA_ARGS
