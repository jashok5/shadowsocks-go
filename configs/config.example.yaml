node:
  id: 1
  get_port_offset_by_node_name: true
  enable_mu_host_rule: true
  mu_regex: "%5m%id.%suffix"
  mu_suffix: "windows.com"

api:
  interface: modwebapi
  url: https://api.example.com
  token: REPLACE_WITH_YOUR_API_TOKEN
  timeout: 10s
  retry_max: 2
  retry_backoff: 500ms
  retry_max_backoff: 5s
  transport_dial_timeout: 5s
  transport_keep_alive: 30s
  transport_max_idle_conns: 200
  transport_max_idle_per_host: 64
  transport_idle_conn_timeout: 90s
  transport_tls_handshake_timeout: 5s
  transport_expect_continue_timeout: 1s

sync:
  update_interval: 60s
  failure_base_wait: 3s
  failure_max_wait: 60s

runtime:
  driver: ssr
  reconcile_workers: 0
  handshake_max_concurrent: 0
  per_ip_handshake_max: 0
  on_unsupported_cipher: skip
  dial_timeout: 8s
  dns_prefer_ipv4: true
  dns_resolver: "8.8.8.8:53"
  max_udp_session_per_port: 2048
  max_udp_resolve_cache_entries: 4096
  udp_assoc_error_delta_warn: 3
  switchrule:
    enabled: false
    mode: none
    expr: ""

security:
  auto_block:
    enabled: false
    backend: noop
    sync_interval: 60s
    protect_node_ip: true
    static_whitelist:
      - 127.0.0.1
      - ::1

update:
  enabled: true
  repository: jashok5/shadowsocks-go
  check_interval: 30m
  timeout: 30s
  allow_prerelease: false

log:
  level: info
  format: console
